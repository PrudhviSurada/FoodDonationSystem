<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Food, Share Hope | Welcome</title>
<meta name="description" content="Donate surplus food to NGOs, coordinate volunteers, and help end hunger in your community.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loader-bowl"></div>
  <div class="text-muted small">Preparing something kind…</div>
</div>

<div class="page-shell">

  <div class="blob-corner blob-top-left"></div>
  <div class="blob-corner blob-bottom-right"></div>

  <i class="bi bi-suit-heart line-icon d-none d-md-block" style="top:560px; left:40px; font-size:1.7rem; color:rgba(255,255,255,.55);"></i>
  <i class="bi bi-heart line-icon d-none d-md-block" style="top:220px; right:90px; font-size:1.5rem; color:rgba(255,255,255,.55);"></i>
  <i class="bi bi-cup-straw line-icon d-none d-md-block" style="top:70px; right:140px; font-size:2.4rem; color:rgba(255,255,255,.55);"></i>

  <main class="content-layer container py-5">

    <section class="text-center mx-auto fade-in-up" style="max-width:720px;">
      <div class="hero-emblem"><i class="bi bi-heart-fill"></i></div>
      <h1 class="display-4 fw-bold mb-2">Welcome</h1>
      <div class="divider-flourish"><span class="line"></span><i class="bi bi-heart-fill"></i><span class="line"></span></div>
      <h2 class="h3 fw-bold mb-3">Share Food, Share Hope</h2>
      <p class="text-secondary mb-2">
        Your extra food can fill someone's empty stomach<br class="d-none d-md-block">
        and bring a smile to their face.
      </p>
      <p class="script-text fs-4 mb-5">Donate Today, Make a Difference!</p>
    </section>

    <section class="row justify-content-center g-4 mx-auto fade-in-up" style="max-width:1040px; animation-delay:.1s;">
      <div class="col-12 col-md-6 col-lg-4">
        <button class="role-card ngo" onclick="selectRole('ngo')" >
          <span class="role-icon"><i class="bi bi-people-fill"></i></span>
          <span>
            <div class="role-title">NGO</div>
            <div class="role-sub">Login as NGO Admin</div>
          </span>
        </button>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <button class="role-card user" onclick="selectRole('user')">
          <span class="role-icon"><i class="bi bi-person-fill"></i></span>
          <span>
            <div class="role-title">User</div>
            <div class="role-sub">Login as Donor / User</div>
          </span>
        </button>
      </div>
      <div class="col-12 col-md-6 col-lg-4 mx-auto">
        <button class="role-card volunteer" onclick="selectRole('volunteer')">
          <span class="role-icon"><i class="bi bi-bicycle"></i></span>
          <span>
            <div class="role-title">Volunteer</div>
            <div class="role-sub">Help with pickups &amp; delivery</div>
          </span>
        </button>
      </div>
    </section>

    <section class="text-center mt-5 fade-in-up" style="animation-delay:.2s;">
      <div class="divider-flourish"><span class="line"></span><i class="bi bi-hand-thumbs-up"></i><span class="line"></span></div>
      <p class="fw-semibold mb-0">Together, we can reduce food waste and end hunger.</p>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
