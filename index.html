<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Food, Share Hope | Welcome</title>
  <meta name="description" content="Donate surplus food to NGOs and help end hunger in your community.">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <!-- Shared stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loader-bowl"></div>
    <div class="text-muted small">Preparing something kind…</div>
  </div>

  <div class="page-shell">

    <!-- Decorative background -->
    <div class="blob-corner blob-top-left">
      <div class="dot-grid" style="top:30px; left:30px;">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="blob-corner blob-bottom-right"></div>

    <i class="bi bi-suit-heart line-icon d-none d-md-block" style="top:520px; left:40px; font-size:1.8rem;"></i>
    <i class="bi bi-bag-heart line-icon d-none d-md-block" style="top:610px; left:60px; font-size:2.4rem;"></i>
    <i class="bi bi-heart line-icon d-none d-md-block" style="top:230px; right:90px; font-size:1.6rem;"></i>
    <i class="bi bi-cup-straw line-icon d-none d-md-block" style="top:80px; right:140px; font-size:2.6rem;"></i>
    <i class="bi bi-basket2 line-icon d-none d-md-block" style="top:130px; right:60px; font-size:2.2rem;"></i>

    <main class="content-layer container py-5">

      <!-- Hero -->
      <section class="text-center mx-auto fade-in-up" style="max-width: 700px;">
        <div class="hero-emblem">
          <i class="bi bi-heart-fill"></i>
        </div>
        <h1 class="display-4 fw-bold mb-2" style="font-family:var(--font-display);">Welcome</h1>
        <div class="divider-flourish">
          <span class="line"></span>
          <i class="bi bi-heart-fill"></i>
          <span class="line"></span>
        </div>
        <h2 class="h3 fw-bold mb-3">Share Food, Share Hope</h2>
        <p class="text-secondary mb-2">
          Your extra food can fill someone's empty stomach<br class="d-none d-md-block">
          and bring a smile to their face.
        </p>
        <p class="script-text fs-4 mb-5">Donate Today, Make a Difference!</p>
      </section>

      <!-- Role selection -->
      <section class="row justify-content-center g-4 mx-auto fade-in-up" style="max-width: 820px; animation-delay: .1s;">
        <div class="col-12 col-md-6">
          <button class="role-card ngo" onclick="selectRole('ngo')">
            <span class="role-icon"><i class="bi bi-people-fill"></i></span>
            <span>
              <div class="role-title">NGO</div>
              <div class="role-sub">Login as NGO Admin</div>
            </span>
          </button>
        </div>
        <div class="col-12 col-md-6">
          <button class="role-card user" onclick="selectRole('user')">
            <span class="role-icon"><i class="bi bi-person-fill"></i></span>
            <span>
              <div class="role-title">User</div>
              <div class="role-sub">Login as Donor / User</div>
            </span>
          </button>
        </div>
      </section>

      <!-- Footer quote -->
      <section class="text-center mt-5 fade-in-up" style="animation-delay: .2s;">
        <div class="divider-flourish">
          <span class="line"></span>
          <i class="bi bi-hand-thumbs-up"></i>
          <span class="line"></span>
        </div>
        <p class="fw-semibold mb-0">Together, we can reduce food waste and end hunger.</p>
      </section>

    </main>

    <!-- Decorative donate-food image corner (left) -->
    <div class="position-fixed d-none d-lg-block" style="bottom: 0; left: 36px; z-index: 1;">
      <div class="bg-white rounded-top-4 shadow-sm px-3 pt-2" style="border:1px solid var(--line);">
        <i class="bi bi-basket3-fill text-warning" style="font-size: 3rem;"></i>
      </div>
    </div>

    <!-- Decorative badge bottom-right -->
    <div class="position-fixed d-none d-lg-flex flex-column align-items-center justify-content-center text-center"
         style="bottom: 26px; right: 70px; width: 110px; height: 110px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; z-index: 2;">
      <i class="bi bi-heart-fill text-white mb-1"></i>
      <span class="text-white small fw-semibold lh-sm">Good Food<br>Good Deed</span>
    </div>

  </div>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Shared app logic -->
  <script src="script.js"></script>
</body>
</html>
